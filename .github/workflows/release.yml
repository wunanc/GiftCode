name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      TAG: ${{ steps.get_tag.outputs.TAG }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Stage artifacts
        run: |
          mkdir -p staging
          # 复制 target 目录下所有的 jar 文件到 staging
          cp target/GiftCode-*.jar staging/

      - name: Get tag name
        id: get_tag
        run: |
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate categorized changelog
        id: changelog
        run: |
          # 获取上一个tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREVIOUS_TAG" ]; then
            # 获取两个tag之间的提交信息
            COMMITS=$(git log $PREVIOUS_TAG..HEAD --pretty=format:"%s" --no-merges)
          else
            # 如果是第一个tag，获取所有提交信息
            COMMITS=$(git log --pretty=format:"%s" --no-merges)
          fi
          
          # 初始化分类变量
          FEATURES=""
          BUG_FIXES=""
          DOCS=""
          OTHER=""
          
          # 按行处理每个提交
          while IFS= read -r commit; do
            # 提取提交类型和内容
            if [[ "$commit" =~ ^feat(\([^)]+\))?:\ (.*) ]]; then
              FEATURES="${FEATURES}- ${BASH_REMATCH[2]}\n"
            elif [[ "$commit" =~ ^fix(\([^)]+\))?:\ (.*) ]]; then
              BUG_FIXES="${BUG_FIXES}- ${BASH_REMATCH[2]}\n"
            elif [[ "$commit" =~ ^docs(\([^)]+\))?:\ (.*) ]]; then
              DOCS="${DOCS}- ${BASH_REMATCH[2]}\n"
            elif [[ "$commit" =~ ^refactor(\([^)]+\))?:\ (.*) ]]; then
              DOCS="${DOCS}- ${BASH_REMATCH[2]}\n"
            elif [[ "$commit" =~ ^(Merge|merge) ]]; then
              # 跳过合并提交
              continue
            else
              OTHER="${OTHER}- ${commit}\n"
            fi
          done <<< "$COMMITS"
          
          # 生成最终changelog
          CHANGELOG=""
          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}## Features\n${FEATURES}\n"
          fi
          if [ -n "$BUG_FIXES" ]; then
            CHANGELOG="${CHANGELOG}## Bug Fixes\n${BUG_FIXES}\n"
          fi
          if [ -n "$DOCS" ]; then
            CHANGELOG="${CHANGELOG}## Documentation\n${DOCS}\n"
          fi
          if [ -n "$OTHER" ]; then
            CHANGELOG="${CHANGELOG}## Other Changes\n${OTHER}\n"
          fi
          
          # 将changelog写入文件
          echo -e "$CHANGELOG" > changelog.md
          
          # 输出到环境变量
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: staging/

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: changelog.md

  release-github:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: staging

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog

      - name: List files (debug)
        run: |
          echo "Files in staging:"
          ls -la staging/

      - name: GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.build.outputs.TAG }}
          name: ${{ needs.build.outputs.TAG }}
          files: staging/*.jar
          body_path: changelog.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

  release-modrinth:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: staging

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog

      - name: Get version number
        id: version
        run: |
          VERSION="${{ needs.build.outputs.TAG }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: List files (debug)
        run: |
          echo "Files in staging:"
          ls -la staging/

      - name: Modrinth Release
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ozJTYG4R
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          name: ${{ needs.build.outputs.TAG }}
          version: ${{ steps.version.outputs.version }}
          version-type: release
          files: staging/*.jar
          loaders: folia paper purpur
          game-versions: |
            1.20.1
            1.20.2
            1.20.3
            1.20.4
            1.20.5
            1.20.6
            1.21
            1.21.1
            1.21.2
            1.21.3
            1.21.4
            1.21.5
            1.21.6
          changelog-file: changelog.md
          fail-mode: fail