name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    #	配置权限
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      TAG: ${{ steps.get_tag.outputs.TAG }}
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: "Set up JDK 17"
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: "Build with Maven"
        run: |
          mvn clean package -PBuildFull=false
          mvn package -PBuildFull=true
      - name: "Stage"
        run: |
          mkdir -p staging
          mv target/*.jar staging/
      - name: "Get Tag"
        id: get_tag
        run: |
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - name: "Upload Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: staging/

  release-github:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "Download Artifacts"
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: staging
      - name: "GitHub Release"
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GH_TOKEN }}"
          automatic_release_tag: "${{ needs.build.outputs.TAG }}"
          prerelease: false
          files: |
            staging/GiftCode-*.jar

  release-modrinth:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: "Download Artifacts"
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: staging
      - name: "Modrinth Release"
        uses: dsx137/modrinth-releaser@main
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        with:
          name: ${{ needs.build.outputs.TAG }}
          project_id: vVZc7jAV
          loaders: folia, paper ,purpur
          game_versions: 1.20.1:1.21.11
          version_number: ${{ needs.build.outputs.TAG }}
          files: |
            staging/GiftCode-*.jar
          changelog: "See https://github.com/wunanc/GiftCode/releases/tag/${{ needs.build.outputs.TAG }}"
          version_type: release
          featured: false