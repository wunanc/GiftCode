name: GiftCode
version: ${project.version}
main: top.wunanc.giftcode.GiftCode
api-version: '1.20'
authors: [ Wunanc ]
description: Add redeem code functionality to your server, with Folia support!
website: https://mc.wunanc.top
folia-supported: true

commands:
  gc:
    aliases: [ giftcode ]
    permission: giftcode.use
    description: 兑换码主命令
    usage: /gc <uuid>

permissions:
  giftcode.use:
    default: true
  giftcode.admin:
    default: op